<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket2Cash — Afriland First Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --brand:#C1121F; --brand-600:#A50F1A; --brand-700:#8A0C15; --brand-tint:#FDECEE;
  --font-sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --font-display:'Plus Jakarta Sans',var(--font-sans);
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --r-sm:8px; --r-md:12px; --r-lg:16px;
  --sidebar-w:266px; --topbar-h:64px;
  --ok:#127A45; --ok-bg:#E6F4EC;
  --warn:#B25E09; --warn-bg:#FBEFDD;
  --info:#1553B8; --info-bg:#E7F0FE;
  --danger:#B42318; --danger-bg:#FCE9E7;
  --muted-badge:#5A6472; --muted-bg:#EEF1F5;
}
/* ---------- LIGHT: whole shell light ---------- */
html[data-theme="light"]{
  --bg:#F4F6FA; --bg-grad:radial-gradient(1100px 480px at 82% -12%, #fbe9ea 0%, transparent 62%);
  --surface:#FFFFFF; --surface-2:#F7F9FC; --elevated:#FFFFFF;
  --border:#E6EAF1; --border-strong:#D6DCE7;
  --text:#101828; --text-2:#48566B; --muted:#8A94A6;
  /* sidebar = light */
  --side-bg:#FFFFFF; --side-text:#48566B; --side-strong:#101828; --side-muted:#98A2B3;
  --side-hover:#F2F5FA; --side-border:#E6EAF1;
  --logo-chip:#FFFFFF; --logo-border:#E6EAF1;
  --logout-bg:#FDECEE; --logout-text:#B42318; --logout-border:#F6CDD1;
  --input-bg:#FFFFFF;
  --shadow-sm:0 1px 2px rgba(16,24,40,.05);
  --shadow-md:0 4px 16px rgba(16,24,40,.08);
  --shadow-lg:0 12px 40px rgba(16,24,40,.14);
}
/* ---------- DARK: whole shell dark ---------- */
html[data-theme="dark"]{
  --bg:#090C12; --bg-grad:radial-gradient(1100px 480px at 82% -12%, rgba(193,18,31,.15) 0%, transparent 62%);
  --surface:#12161F; --surface-2:#161C27; --elevated:#161C27;
  --border:#232B39; --border-strong:#2C3648;
  --text:#E9EDF5; --text-2:#AEB7C6; --muted:#727D90;
  /* sidebar = dark */
  --side-bg:#0D121A; --side-text:#AEB7C6; --side-strong:#F1F4FA; --side-muted:#6B7688;
  --side-hover:rgba(255,255,255,.05); --side-border:#1E2531;
  --logo-chip:#FFFFFF; --logo-border:#2A3342;
  --logout-bg:rgba(193,18,31,.16); --logout-text:#FF8F96; --logout-border:rgba(193,18,31,.28);
  --input-bg:#0E1219;
  --ok-bg:#0e2a1c; --warn-bg:#2c1f0d; --info-bg:#0f1f3a; --danger-bg:#2c1512; --muted-bg:#1a2130;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow-md:0 4px 16px rgba(0,0,0,.4);
  --shadow-lg:0 16px 46px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-sans);background:var(--bg);background-image:var(--bg-grad);
  background-attachment:fixed;color:var(--text);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;transition:background-color .3s ease,color .3s ease;
}
/* global smooth theme transition */
.sidebar,.topbar,.panel,.kpi,.table-wrap,.nav-item,.btn,input,select,.badge,thead th,tbody td{
  transition:background-color .3s ease,color .3s ease,border-color .3s ease,box-shadow .3s ease;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:14px}
::selection{background:var(--brand-tint);color:var(--brand-700)}
:focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:6px}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:20px;border:3px solid transparent;background-clip:padding-box}

/* ============ LAYOUT ============ */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
.sidebar{
  background:var(--side-bg);color:var(--side-text);display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;z-index:60;border-right:1px solid var(--side-border);
}
.main{min-width:0;display:flex;flex-direction:column}

/* ---- Brand / logo (Afriland only) ---- */
.brand-box{padding:22px 18px 16px;display:flex;align-items:center;justify-content:center}
.brand-logo{display:flex;align-items:center;justify-content:center;width:100%;min-height:78px}
.brand-logo img{height:72px;max-width:100%;object-fit:contain;transition:filter .18s ease}
/* Light sidebar -> original logo. Dark sidebar -> white logo (same trick as the login page). */
html[data-theme="dark"] .brand-logo img{filter:brightness(0) invert(1)}
.brand-logo .fallback{font-family:var(--font-display);font-weight:800;color:var(--brand);font-size:20px;text-align:center;line-height:1.15}
html[data-theme="dark"] .brand-logo .fallback{color:#fff}
.logo-divider{height:1px;background:var(--side-border);margin:2px 16px 10px}

/* ---- Sidebar search ---- */
.side-search{padding:0 14px 12px;position:relative}
.side-search svg{position:absolute;left:26px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--side-muted)}
.side-search input{
  width:100%;background:var(--side-hover);border:1px solid var(--side-border);color:var(--side-strong);
  border-radius:10px;padding:9px 12px 9px 34px;font-size:13px
}
.side-search input::placeholder{color:var(--side-muted)}
.side-search input:focus{border-color:var(--brand);outline:none;box-shadow:0 0 0 3px var(--brand-tint)}
html[data-theme="dark"] .side-search input:focus{box-shadow:0 0 0 3px rgba(193,18,31,.14)}

/* ---- Nav ---- */
.nav{flex:1;overflow-y:auto;padding:4px 10px 10px}
.nav::-webkit-scrollbar{width:6px}
.nav::-webkit-scrollbar-thumb{background:var(--border-strong)}
.nav-group{margin-top:14px}
.nav-group h4{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--side-muted);font-weight:700;padding:0 12px 6px}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:var(--side-text);
  font-size:13.5px;font-weight:500;margin-bottom:1px;position:relative;cursor:pointer
}
.nav-item svg{width:18px;height:18px;flex:0 0 18px;opacity:.8}
.nav-item:hover{background:var(--side-hover);color:var(--side-strong)}
.nav-item.active{background:linear-gradient(90deg,var(--brand) 0%,var(--brand-600) 100%);color:#fff;box-shadow:0 6px 16px rgba(193,18,31,.32)}
.nav-item.active svg{opacity:1}

/* ---- Sidebar footer ---- */
.side-footer{padding:12px 14px 16px;border-top:1px solid var(--side-border)}
.side-footer .profile{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer}
.side-footer .profile:hover{background:var(--side-hover)}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#f2545b);display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px;flex:0 0 34px}
.side-footer .who{min-width:0}
.side-footer .who b{display:block;font-size:13px;color:var(--side-strong);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-footer .who small{color:var(--side-muted);font-size:11px}
.btn-logout{width:100%;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;padding:9px;border-radius:10px;background:var(--logout-bg);color:var(--logout-text);font-size:13px;font-weight:600;border:1px solid var(--logout-border)}
.btn-logout:hover{background:var(--brand);color:#fff;border-color:transparent}

/* ============ TOPBAR ============ */
.topbar{
  height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 20px;position:sticky;top:0;z-index:40
}
.hamburger{display:none;width:38px;height:38px;border-radius:10px;border:1px solid var(--border);align-items:center;justify-content:center;flex:0 0 38px;color:var(--text)}
.hamburger:hover{background:var(--surface-2)}
.tb-brand{font-family:var(--font-display);font-weight:800;font-size:17px;letter-spacing:-.02em;color:var(--text);white-space:nowrap}
.tb-brand span{color:var(--brand)}
.tb-role{font-size:12px;font-weight:600;color:var(--brand-700);background:var(--brand-tint);padding:3px 10px;border-radius:20px;white-space:nowrap}
html[data-theme="dark"] .tb-role{background:rgba(193,18,31,.18);color:#ff9ba1}
.tb-search{flex:1;max-width:440px;position:relative;min-width:0}
.tb-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--muted)}
.tb-search input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:10px 12px 10px 38px;color:var(--text)}
.tb-search input::placeholder{color:var(--muted)}
.tb-search input:focus{border-color:var(--brand);background:var(--surface);outline:none;box-shadow:0 0 0 4px var(--brand-tint)}
html[data-theme="dark"] .tb-search input:focus{box-shadow:0 0 0 4px rgba(193,18,31,.16)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-date{font-size:11.5px;color:var(--text-2);text-align:right;line-height:1.25;white-space:nowrap}
.tb-date b{display:block;color:var(--text);font-weight:600;text-transform:capitalize}
.icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--text-2);border:1px solid transparent;position:relative}
.icon-btn:hover{background:var(--surface-2);color:var(--text);border-color:var(--border)}
.icon-btn svg{width:19px;height:19px}
.icon-btn .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;background:var(--brand);border-radius:50%;border:2px solid var(--surface)}
.lang-sel{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:12.5px;font-weight:500}

/* ============ CONTENT ============ */
.content{padding:24px 28px 40px;flex:1}
.page-head{margin-bottom:22px}
.page-head h1{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.02em}
.page-head p{color:var(--text-2);font-size:14px;margin-top:4px}
.page-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;font-size:13.5px;font-weight:600;border:1px solid transparent}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 6px 16px rgba(193,18,31,.28)}
.btn-primary:hover{background:var(--brand-600)}
.btn-ghost{background:var(--surface);border-color:var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--surface-2);border-color:var(--border-strong)}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--brand),#f2545b)}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--border-strong);transition:transform .18s,box-shadow .18s}
.kpi .kpi-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px}
.kpi .kpi-icon{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--brand-tint);color:var(--brand);flex:0 0 38px}
html[data-theme="dark"] .kpi .kpi-icon{background:rgba(193,18,31,.16)}
.kpi .kpi-icon svg{width:20px;height:20px}
.kpi .kpi-label{font-size:12.5px;color:var(--text-2);font-weight:500}
.kpi .kpi-val{font-family:var(--font-display);font-size:28px;font-weight:800;letter-spacing:-.02em;line-height:1.05;margin-top:6px}
.kpi .kpi-sub{font-size:12px;color:var(--muted);margin-top:8px}

.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:22px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.panel-head h3{font-family:var(--font-display);font-size:15px;font-weight:700}
.panel-head .link{font-size:12.5px;color:var(--brand);font-weight:600;cursor:pointer}
.panel-body{padding:16px 18px}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
.table-toolbar{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.table-toolbar .count-pill{font-size:12px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);padding:4px 11px;border-radius:20px;font-weight:600}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:640px}
thead th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:12px 18px;background:var(--surface-2);border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:13px 18px;border-bottom:1px solid var(--border);font-size:13.5px;color:var(--text);vertical-align:middle}
tbody tr:hover{background:var(--surface-2)}
tbody tr:last-child td{border-bottom:none}
td .mono{font-family:var(--font-mono);font-size:12.5px;color:var(--text-2)}
td .strong{font-weight:600}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.b-ok{color:var(--ok);background:var(--ok-bg)} .b-warn{color:var(--warn);background:var(--warn-bg)}
.b-info{color:var(--info);background:var(--info-bg)} .b-danger{color:var(--danger);background:var(--danger-bg)}
.b-muted{color:var(--muted-badge);background:var(--muted-bg)}

.legend{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.legend .row{display:flex;align-items:center;gap:9px;font-size:13px}
.legend .row .sw{width:10px;height:10px;border-radius:3px}
.legend .row b{margin-left:auto;font-weight:700}

.sk{background:linear-gradient(90deg,var(--surface-2) 25%,var(--border) 37%,var(--surface-2) 63%);background-size:400% 100%;animation:sh 1.3s infinite;border-radius:6px}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
.sk-line{height:12px;margin:8px 0}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeUp .3s ease both}
.empty{padding:52px 24px;text-align:center;color:var(--muted)}
.empty svg{width:44px;height:44px;margin-bottom:12px;opacity:.5}
.empty h4{font-size:15px;color:var(--text);font-weight:700;margin-bottom:5px}
.empty p{font-size:13px;max-width:340px;margin:0 auto}

.profile-card{max-width:640px}
.pf-row{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.pf-row:last-child{border:none}
.pf-row .k{color:var(--text-2);font-size:13.5px}
.pf-row .v{font-weight:600;font-family:var(--font-mono);font-size:13px}

.overlay{display:none;position:fixed;inset:0;background:rgba(4,4,8,.5);z-index:55;backdrop-filter:blur(2px)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--elevated);border:1px solid var(--border);box-shadow:var(--shadow-lg);border-radius:12px;padding:13px 16px;font-size:13.5px;font-weight:500;z-index:100;animation:fadeUp .25s;max-width:340px;color:var(--text)}
.toast.err{border-left:3px solid var(--brand)} .toast.ok{border-left:3px solid var(--ok)}
.tree-toggle{display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;margin-right:8px;transition:transform .15s;color:var(--muted);vertical-align:middle}
.partner-row{cursor:pointer}
.partner-row.open .tree-toggle{transform:rotate(90deg)}
.partner-row:hover{background:var(--surface-2)}
.child-row{display:none}
.child-row.show{display:table-row}
.child-row td:first-child{padding-left:46px;color:var(--text-2)}
.cred-box{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.cred-box .k{font-size:12px;color:var(--muted);font-weight:600}
.cred-box .v{font-family:var(--font-mono);font-weight:600;font-size:14px;word-break:break-all}

/* ---- avatar image ---- */
.avatar img,.avatar-lg img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.avatar-lg{width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#f2545b);display:grid;place-items:center;color:#fff;font-weight:800;font-size:30px;overflow:hidden;flex:0 0 84px;position:relative}
.tb-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,var(--brand),#f2545b);display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px;cursor:pointer;border:2px solid var(--border)}
/* ---- tabs ---- */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:22px;flex-wrap:wrap}
.tab{padding:10px 16px;font-size:13.5px;font-weight:600;color:var(--text-2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}
/* ---- forms ---- */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:12.5px;font-weight:600;color:var(--text-2)}
.field input,.field select,.field textarea{background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);width:100%;font-size:13.5px}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);outline:none;box-shadow:0 0 0 3px var(--brand-tint)}
html[data-theme="dark"] .field input:focus,html[data-theme="dark"] .field select:focus{box-shadow:0 0 0 3px rgba(193,18,31,.16)}
.field .hint{font-size:11.5px;color:var(--muted)}
.info-banner{background:var(--info-bg);border:1px solid transparent;border-radius:12px;padding:12px 16px;font-size:13px;color:var(--text-2);margin-bottom:18px;display:flex;gap:10px;align-items:flex-start}
.info-banner svg{width:18px;height:18px;color:var(--info);flex:0 0 18px;margin-top:1px}
.info-banner b{color:var(--text)}
/* ---- product toolbar ---- */
.prod-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.prod-toolbar .grow{flex:1;min-width:180px}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.seg button{padding:9px 13px;font-size:12.5px;font-weight:600;color:var(--text-2);background:var(--surface);border-right:1px solid var(--border)}
.seg button:last-child{border-right:none}
.seg button:hover{background:var(--surface-2);color:var(--text)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.mini-btn{padding:6px 11px;font-size:12px;font-weight:600;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.mini-btn:hover{background:var(--surface-2)}
.mini-btn.danger{color:var(--danger);border-color:transparent;background:var(--danger-bg)}
/* ---- modal ---- */
.modal-back{position:fixed;inset:0;background:rgba(6,8,12,.55);z-index:90;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;backdrop-filter:blur(2px);animation:fadeUp .2s}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:560px;overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-head h3{font-family:var(--font-display);font-size:16px;font-weight:700}
.modal-head .x{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--muted)}
.modal-head .x:hover{background:var(--surface-2);color:var(--text)}
.modal-body{padding:20px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 20px;border-top:1px solid var(--border);background:var(--surface-2)}
@media(max-width:640px){.form-grid{grid-template-columns:1fr}}
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}}
@media(max-width:1024px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;top:0;left:0;width:290px;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
  body.nav-open .sidebar{transform:translateX(0)}
  body.nav-open .overlay{display:block}
  .hamburger{display:flex}
}
@media(max-width:720px){.content{padding:18px 16px 34px}.tb-search{display:none}.tb-date{display:none}.lang-sel{display:none}.page-head h1{font-size:22px}}
@media(max-width:560px){.kpi-grid{grid-template-columns:1fr}.tb-role{display:none}}
</style>
</head>
<body>
<div class="overlay" onclick="closeNav()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand-box">
      <div class="brand-logo">
        <img src="/assets/logo-afriland.png" alt="Afriland First Bank"
             onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <div class="fallback" style="display:none">Afriland<br>First Bank</div>
      </div>
    </div>
    <div class="logo-divider"></div>
    <div class="side-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="navSearch" oninput="filterNav(this.value)">
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-footer">
      <div class="profile" onclick="go('account')">
        <div class="avatar" id="sideAvatar">A</div>
        <div class="who"><b id="sideName">Admin</b><small id="sideRole">ADMIN</small></div>
      </div>
      <button class="btn-logout" onclick="logout()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>
        <span id="logoutTxt">Déconnexion</span>
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="hamburger" onclick="openNav()" aria-label="Menu">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div class="tb-brand">Ticket<span>2</span>Cash</div>
      <div class="tb-role" id="tbRole">Admin</div>
      <div class="tb-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="globalSearch" oninput="tableSearch(this.value)">
      </div>
      <div class="tb-right">
        <div class="tb-date"><b id="dateMain">—</b><span id="dateSub"></span></div>
        <select class="lang-sel" id="lang" onchange="setLang(this.value)">
          <option value="fr">Français</option>
          <option value="en">English</option>
        </select>
        <button class="icon-btn" title="Notifications"><span class="dot"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        </button>
        <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Theme"></button>
        <div class="tb-avatar" id="tbAvatar" onclick="go('account')" title="Compte">A</div>
      </div>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>

/* ============ API + FORMAT ============ */
async function api(path,opts={}){
  const res=await fetch(API+path,Object.assign({credentials:"same-origin",headers:{"Content-Type":"application/json"}},opts));
  if(res.status===401){location.href="/login.html";throw new Error("unauth");}
  const txt=await res.text();
  if(!res.ok)throw new Error(txt||res.status);
  try{return txt?JSON.parse(txt):null;}catch(_){return txt;}
}
const nf=new Intl.NumberFormat("fr-FR");
function money(v){if(v==null||v==="")return "—";return nf.format(Math.round(Number(v)))+" FCFA";}
function num(v){return v==null?"0":nf.format(Number(v));}
function dt(v){if(!v)return "—";const d=new Date(v);if(isNaN(d))return v;return d.toLocaleDateString(LANG==="fr"?"fr-FR":"en-US",{day:"2-digit",month:"short",year:"numeric"});}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function badge(status){
  const s=String(status||"").toUpperCase();
  const map={ACTIVE:"b-ok",VALIDATED:"b-ok",SUCCESS:"b-ok",PAID:"b-ok",APPROVED:"b-ok",OCR_PROCESSED:"b-ok",RESOLVED:"b-ok",
    PENDING:"b-warn",OCR_PENDING:"b-warn",PAUSED:"b-warn",UNDER_REVIEW:"b-warn",SUBMITTED:"b-info",
    DRAFT:"b-muted",EXPIRED:"b-muted",CLOSED:"b-muted",OPEN:"b-danger",REJECTED:"b-danger",FAILED:"b-danger",SUSPENDED:"b-danger",
    ADMIN:"b-info",PARTNER:"b-ok",OPERATEUR:"b-warn",LECTEUR:"b-muted"};
  return `<span class="badge ${map[s]||"b-muted"}">${esc(stLabel(status))}</span>`;
}
function head(title,sub,actions){return `<div class="page-head"><h1>${esc(title)}</h1>${sub?`<p>${esc(sub)}</p>`:""}${actions?`<div class="page-actions">${actions}</div>`:""}</div>`;}
function refreshBtn(){return `<button class="btn btn-ghost" onclick="go('${CURRENT}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>${t("refresh")}</button>`;}

function kpiCard(k){return `<div class="kpi"><div class="kpi-top">
  <div><div class="kpi-label">${esc(k.label)}</div><div class="kpi-val" data-count="${(''+k.val).replace(/[^\d]/g,'')}" data-suffix="${(''+k.val).replace(/[\d\s.,]/g,'').trim()}">${esc(k.val)}</div></div>
  <div class="kpi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">${IC[k.icon]}</svg></div>
  </div>${k.sub?`<div class="kpi-sub">${esc(k.sub)}</div>`:""}</div>`;}
function renderRecentClaims(claims){
  const el=document.getElementById("recentClaims");if(!el)return;
  if(!claims||!claims.length){el.innerHTML=emptyMini(t("no_claims"));return;}
  el.innerHTML=`<div class="table-scroll"><table style="min-width:auto"><tbody>${claims.slice(0,6).map(c=>`<tr>
    <td>${c.merchantId!=null?merchantChain(c.merchantId):`<span class="mono">${esc(c.claimReference||("#"+c.id))}</span>`}</td>
    <td class="strong">${money(c.cashbackAmount)}</td><td>${badge(c.status)}</td>
    <td style="color:var(--muted);font-size:12px">${dt(c.submittedAt)}</td></tr>`).join("")}</tbody></table></div>`;
}
function donut(data){
  const total=data.reduce((a,b)=>a+b.v,0)||1;let acc=0;const R=52,C=2*Math.PI*R;
  const segs=data.map(d=>{const frac=d.v/total,dash=frac*C,seg=`<circle r="${R}" cx="70" cy="70" fill="none" stroke="${d.c}" stroke-width="18" stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${-acc*C}" transform="rotate(-90 70 70)"/>`;acc+=frac;return seg;}).join("");
  return `<div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap"><svg width="140" height="140" viewBox="0 0 140 140" style="flex:0 0 140px">
    <circle r="${R}" cx="70" cy="70" fill="none" stroke="var(--border)" stroke-width="18"/>${segs}
    <text x="70" y="66" text-anchor="middle" font-size="26" font-weight="800" fill="var(--text)" font-family="Plus Jakarta Sans">${total}</text>
    <text x="70" y="84" text-anchor="middle" font-size="10" fill="var(--muted)">${t("claims_lc")}</text></svg>
    <div class="legend" style="flex:1;min-width:160px">${data.map(d=>`<div class="row"><span class="sw" style="background:${d.c}"></span>${d.k}<b>${d.v}</b></div>`).join("")}</div></div>`;
}

async function renderTable(key){

  const addClick = key==="merchants" ? "merchantModal()" : `toast(t('form_soon')+' ${cfg.ep}','ok')`;

    <div class="table-wrap"><div class="table-toolbar"><span class="count-pill" id="cp">—</span></div>

    <tbody id="tbody">${rowSkeleton(cfg.cols.length,6)}</tbody></table></div></div></div>`;
  try{
    let rows=await api(EP);
    if(!Array.isArray(rows))rows=rows&&rows.content?rows.content:[];
    CACHE[key]=rows; paintRows(key,rows);
  }catch(e){document.getElementById("tbody").innerHTML=`<tr><td colspan="${cfg.cols.length}">${emptyMini(t("err_load"))}</td></tr>`;document.getElementById("cp").textContent="0";}
}
function cell(row,col){
  const [field,,type]=col;let v=row[field];
  switch(type){
    case "strong":return `<span class="strong">${esc(v||"—")}</span>`;
    case "mono":return `<span class="mono">${esc(v||"—")}</span>`;
    case "money":return money(v);
    case "date":return `<span style="color:var(--text-2)">${dt(v)}</span>`;
    case "badge":return badge(v);
    case "bool":return v?`<span class="badge b-ok">${t("yes")}</span>`:`<span class="badge b-muted">${t("no")}</span>`;
    case "lock":return v?`<span class="badge b-danger">${t("locked")}</span>`:`<span class="badge b-ok">${t("active_word")}</span>`;
    case "numval":return `<span class="strong">${esc(v??"—")}${row.cashbackType==="PERCENTAGE"?" %":""}</span>`;
    case "risk":{const n=Number(v)||0,cl=n>=70?"b-danger":n>=40?"b-warn":"b-ok";return `<span class="badge ${cl}">${n}</span>`;}
    case "chain":return merchantChain(v);
    case "parentname":return v!=null&&MMAP[v]?`<span class="badge b-info">${esc(MMAP[v].name)}</span>`:`<span style="color:var(--muted)">—</span>`;
    default:return esc(v==null?"—":v);
  }
}
function paintRows(key,rows){
  const cfg=TABLES[key],tb=document.getElementById("tbody"),cp=document.getElementById("cp");if(!tb)return;
  cp.textContent=rows.length+" "+t("items");
  if(!rows.length){tb.innerHTML=`<tr><td colspan="${cfg.cols.length}">${emptyFull()}</td></tr>`;return;}
  tb.innerHTML=rows.map(r=>`<tr>${cfg.cols.map(col=>`<td>${cell(r,col)}</td>`).join("")}</tr>`).join("");
}

function filteredProducts(){
  const q=PROD_STATE.q.toLowerCase(),cat=PROD_STATE.cat.toLowerCase(),mid=PROD_STATE.merchant;
  return (window.__products||[]).filter(p=>{
    if(mid&&String(p.merchant&&p.merchant.id)!==String(mid))return false;
    if(cat&&String(p.category||"").toLowerCase()!==cat)return false;
    if(q){const hay=[p.sku,p.name,p.brand,p.category,p.groupKey].join(" ").toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
}
function paintProducts(){
  const rows=filteredProducts(),tb=document.getElementById("pBody");if(!tb)return;

async function submitProduct(id){

  try{
    if(id){await api(`${pEP()}/${id}`,{method:"PUT",body:JSON.stringify(body)});toast(t("prod_updated"),"ok");}

async function deleteProduct(id){

    window.__products=(window.__products||[]).filter(p=>p.id!==id);paintProducts();
  }catch(e){toast(String(e.message||e).slice(0,120),"err");}
}
/* import / export */
const PCOLS=["sku","name","category","brand","price","groupKey","cashbackType","cashbackValue"];
function downloadCSV(name,text){const b=new Blob([text],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;a.click();}
function downloadTemplate(){downloadCSV("modele_produits.csv",PCOLS.join(",")+"\n");}
function exportProducts(fmt){
  const rows=filteredProducts();
  if(fmt==="csv"){const csv=[PCOLS.join(",")].concat(rows.map(p=>PCOLS.map(c=>`"${String(c==="cashbackType"?(p.cashbackType||""):p[c]??"").replace(/"/g,'""')}"`).join(","))).join("\n");downloadCSV("produits.csv",csv);}
  else{const html=`<table border="1"><tr>${PCOLS.map(c=>`<th>${c}</th>`).join("")}</tr>${rows.map(p=>`<tr>${PCOLS.map(c=>`<td>${esc(p[c]??"")}</td>`).join("")}</tr>`).join("")}</table>`;const b=new Blob([html],{type:"application/vnd.ms-excel"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="produits.xls";a.click();}
}
async function importMass(e){
  const f=e.target.files&&e.target.files[0];e.target.value="";if(!f)return;
  const mid=PROD_STATE.merchant||(MERCH[0]&&MERCH[0].id);
  if(!mid){toast(t("kpi_merchant"),"err");return;}
  const text=await f.text();const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const hdr=lines.shift().split(",").map(h=>h.trim());
  let ok=0,fail=0;
  for(const line of lines){const cells=line.split(",");const row={};hdr.forEach((h,i)=>row[h]=(cells[i]||"").trim());
    try{await api(pEP(),{method:"POST",body:JSON.stringify({merchantId:Number(mid),sku:row.sku,name:row.name,category:row.category,brand:row.brand,price:row.price?Number(row.price):null,groupKey:row.groupKey,cashbackType:row.cashbackType||"NONE",cashbackValue:row.cashbackValue?Number(row.cashbackValue):0})});ok++;}catch(_){fail++;}}
  toast(`${t("import_done")} ${ok} ✓ / ${fail} ✗`,"ok");renderProducts();
}

/* ============ TENDANCES (analytics from real data) ============ */
function barChart(data,unit){
  const max=Math.max(1,...data.map(d=>d.v));
  return `<div style="display:flex;align-items:flex-end;gap:12px;height:180px;padding-top:10px">${data.map(d=>{
    const h=Math.round((d.v/max)*150);
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0">
      <div style="font-size:11px;font-weight:700;color:var(--text-2)">${unit==="money"?money(d.v):num(d.v)}</div>
      <div style="width:100%;max-width:46px;height:${h}px;background:linear-gradient(180deg,var(--brand),#f2545b);border-radius:8px 8px 3px 3px"></div>
      <div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%">${esc(d.k)}</div>
    </div>`;}).join("")}</div>`;
}

  try{
    const [pays,claims,prods]=await Promise.all([
      api("/api/cashback/payments").catch(()=>[]),
      api("/api/claims").catch(()=>[]),
      api(pEP()).catch(()=>[])
    ]);
    // cashback by month
    const byM={};(Array.isArray(pays)?pays:[]).forEach(p=>{const d=p.processedAt||p.createdAt;if(!d)return;const key=new Date(d).toLocaleDateString(LANG==="fr"?"fr-FR":"en-US",{month:"short",year:"2-digit"});byM[key]=(byM[key]||0)+Number(p.amount||0);});
    const mData=Object.entries(byM).slice(-6).map(([k,v])=>({k,v}));
    document.getElementById("trCash").innerHTML=mData.length?barChart(mData,"money"):emptyMini(t("tr_no_data"));
    // claims by status
    const byS={};(Array.isArray(claims)?claims:[]).forEach(c2=>{const s=stLabel(c2.status);byS[s]=(byS[s]||0)+1;});
    const cols=["#1553B8","#127A45","#0E9F6E","#B42318","#B25E09"];
    const sData=Object.entries(byS).map(([k,v],i)=>({k,v,c:cols[i%cols.length]}));
    document.getElementById("trClaims").innerHTML=sData.length?donut(sData):emptyMini(t("tr_no_data"));
    // top product categories
    const byC={};(Array.isArray(prods)?prods:[]).forEach(p=>{const k=p.category||"—";byC[k]=(byC[k]||0)+1;});
    const cData=Object.entries(byC).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v])=>({k,v}));
    document.getElementById("trCat").innerHTML=cData.length?barChart(cData,"num"):emptyMini(t("tr_no_data"));
  }catch(e){toast(t("err_load"),"err");}
}

  const cfg=CRUD[key],body={};

function genPassword(){
  const U="ABCDEFGHJKLMNPQRSTUVWXYZ",L="abcdefghijkmnpqrstuvwxyz",D="23456789",A=U+L+D;
  let p=[U[Math.floor(Math.random()*U.length)],L[Math.floor(Math.random()*L.length)],D[Math.floor(Math.random()*D.length)]];
  for(let i=0;i<7;i++)p.push(A[Math.floor(Math.random()*A.length)]);
  return p.sort(()=>Math.random()-0.5).join("");
}

function rowSkeleton(cols,rows){return Array(rows).fill(`<tr>${Array(cols).fill('<td><div class="sk sk-line"></div></td>').join("")}</tr>`).join("");}

/* ============ INTERACTIONS ============ */
function animateCounters(){
  document.querySelectorAll("[data-count]").forEach(el=>{
    const target=Number(el.dataset.count);if(!target)return;
    const suf=el.dataset.suffix||"",dur=800,t0=performance.now();
    function step(now){const p=Math.min((now-t0)/dur,1),ease=1-Math.pow(1-p,3),val=Math.round(target*ease);el.textContent=nf.format(val)+(suf?(" "+suf):"");if(p<1)requestAnimationFrame(step);}
    el.textContent="0"+(suf?(" "+suf):"");requestAnimationFrame(step);
  });
}
function tableSearch(q){q=q.trim().toLowerCase();const tb=document.getElementById("tbody");if(!tb)return;tb.querySelectorAll("tr").forEach(tr=>{tr.style.display=tr.textContent.toLowerCase().includes(q)?"":"none";});}

  updateDate();
}
function updateDate(){const d=new Date();document.getElementById("dateMain").textContent=d.toLocaleDateString(LANG==="fr"?"fr-FR":"en-US",{weekday:"long",day:"numeric",month:"long"});document.getElementById("dateSub").textContent=d.getFullYear();}
function openNav(){document.body.classList.add("nav-open");}
function closeNav(){document.body.classList.remove("nav-open");}
async function logout(){try{await api("/api/auth/logout",{method:"POST"});}catch(e){}location.href="/login.html";}
function toast(msg,type){const el=document.createElement("div");el.className="toast "+(type||"");el.textContent=msg;document.body.appendChild(el);setTimeout(()=>{el.style.opacity="0";el.style.transition="opacity .3s";setTimeout(()=>el.remove(),300);},3200);}
window.addEventListener("hashchange",()=>{const id=location.hash.slice(1);if(id&&id!==CURRENT)go(id,true);});
boot();
</script>
</body>
</html>
